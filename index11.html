<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aravind's Website</title>
</head>
<body>
    <form>
        <center><h1>Login Form</h1></center>
        <center>
        <Label for="UserName">User Name:</Label>
        <input type="text" placeholder="enter your UserName" id="UserName" name="UserName"><br>
        <Label for="Password">Password:</Label>
        <input type="password" placeholder="enter your password" id="Password" name="Password"><br>
        <label for="Email">Email:</label>
        <input type="Email" placeholder="enter your email" id="Email" name="Email"><br>
        <label for="Gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male"><label>Male</label>
        <input type="radio" id="female" name="gender" value="female"><label>Female</label><br
        <label for="Department">Department:</label>
        <select id="Department" name="Department">
            <option value="select">Select</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="MECH">MECH</option>
            <option value="CIVIL">CIVIL</option>
            <option value="IT">IT</option>
            <option value="EEE">EEE</option>
            <option value="FT">FT</option>
        </select><br>
        <label for="Hobby">Hobby</label>
        <input type="checkbox" id="Cricket" name="Hobby" value="Cricket"><label>Cricket</label>
        <input type="checkbox" id="VolleyBall" name="Hobby" value="VolleyBall"><label>VolleyBall</label>
        <input type="checkbox" id="Chess" name="Hobby" value="Chess"><label>Chess</label><br>
        <button>Submit</button>
    </center>
    </form>
</body>
</html>
