<body>
    <center>
    <form>
        <label for="name">Name:</label>
        <input type="text" placeholder="enter your name" id="name" name="name"><br>
        <label for="Reg_no">Reg No:</label>
        <input type="number" placeholder="enter your reg no" id="Reg_no" name="Reg_no"><br>
        <label for="department">Department:</label>
        <select id="department" name="department">
            <option value="select">Select</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="MECH">MECH</option>
            <option value="CIVIL">CIVIL</option>
            <option value="IT">IT</option>
            <option value="EEE">EEE</option>
            <option value="FT">FT</option>
        </select><br>
        <label for="email">Email:</label>
        <input type="email" placeholder="enter your email" id="email" name="email"><br>
        <label for="year">Year:</label><br>
        <input type="radio" id="1st" name="year" value="1st">
        <label for="1st">1st</label><br>
        <input type="radio" id="2nd" name="year" value="2nd">
        <label for="2nd">2nd</label><br>
        <input type="radio" id="3rd" name="year" value="3rd">
        <label for="3rd">3rd</label><br>
        <input type="radio" id="4th" name="year" value="4th">
        <label for="4th">4th</label><br>
        <input type="submit" value="Submit">
